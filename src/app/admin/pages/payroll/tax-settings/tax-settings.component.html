<div class="card shadow-sm">
  <div class="container-fluid p-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-semibold">Salary Structures</h4>
    </div>

    <!-- FORM SECTION -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <form (ngSubmit)="onSubmit()" #form="ngForm" novalidate>

          <div class="row g-3">

            <!-- Structure Name -->
            <div class="col-md-4">
              <label class="form-label">Structure Name *</label>
              <input type="text" class="form-control" [(ngModel)]="structure.structureName" name="structureName"
                required>
            </div>

            <!-- Department -->
            <div class="col-md-4">
              <label class="form-label">Department</label>
              <select class="form-select" [(ngModel)]="structure.departmentId" name="departmentId">
                <option value="">Select Department</option>
                <option *ngFor="let d of departments" [value]="d.departmentId">
                  {{ d.departmentName }}
                </option>
              </select>
            </div>

            <!-- Designation -->
            <div class="col-md-4">
              <label class="form-label">Designation</label>
              <select class="form-select" [(ngModel)]="structure.designationId" name="designationId">
                <option value="">Select Designation</option>
                <option *ngFor="let d of designations" [value]="d.designationId">
                  {{ d.designationName }}
                </option>
              </select>
            </div>

            <!-- Grade -->
            <div class="col-md-4">
              <label class="form-label">Grade</label>
              <input type="number" class="form-control" [(ngModel)]="structure.gradeId" name="gradeId">
            </div>

            <!-- Company -->
            <div class="col-md-4">
              <label class="form-label">Company</label>
              <select class="form-select" [(ngModel)]="structure.companyId" name="companyId">
                <option value="">Select Company</option>
                <option *ngFor="let c of companies" [value]="c.companyId">
                  {{ c.companyName }}
                </option>
              </select>
            </div>

            <!-- Region -->
            <div class="col-md-4">
              <label class="form-label">Region</label>
              <select class="form-select" [(ngModel)]="structure.regionId" name="regionId">
                <option value="">Select Region</option>
                <option *ngFor="let r of regions" [value]="r.regionId">
                  {{ r.regionName }}
                </option>
              </select>
            </div>

            <!-- Dynamic Components Section -->
            <!-- Dynamic Components Section -->
            <div class="col-12">
              <hr>
              <h6>Add Components</h6>

              <!-- Labels Row -->
              <div class="row fw-semibold mb-2">
                <div class="col-md-4">Component</div>
                <div class="col-md-3">Value</div>
                <div class="col-md-3">Calculation Type</div>
                <div class="col-md-2">Action</div>
              </div>

              <div *ngFor="let comp of structure.components; let i = index" class="row mb-2">

                <div class="col-md-4">
                  <select class="form-select" [(ngModel)]="comp.componentId" name="component{{i}}">
                    <option value="">Select Component</option>
                    <option *ngFor="let c of salaryComponents" [value]="c.componentId">
                      {{ c.componentName }}
                    </option>
                  </select>
                </div>

                <div class="col-md-3">
                  <input type="number" class="form-control" placeholder="Enter Value" [(ngModel)]="comp.value"
                    name="value{{i}}">
                </div>

                <div class="col-md-3">
                  <select class="form-select" [(ngModel)]="comp.calculationType" name="type{{i}}">
                    <option value="">Select Type</option>
                    <option value="Fixed">Fixed</option>
                    <!-- <option value="Percentage">Percentage</option> -->
                  </select>
                </div>

                <div class="col-md-2">
                  <button type="button" class="btn btn-danger btn-sm" (click)="removeComponent(i)">
                    Remove
                  </button>
                </div>

              </div>

              <button type="button" class="btn btn-secondary btn-sm" (click)="addComponent()">
                + Add Component
              </button>
            </div>

            <!-- Buttons -->
            <div class="col-12 text-end mt-3">
              <button class="btn btn-success me-2" type="submit" [disabled]="!form.valid">
                {{ isEditMode ? 'Update' : 'Save' }}
              </button>

              <button class="btn btn-secondary" type="button" (click)="resetForm()">
                Reset
              </button>
            </div>

          </div>
        </form>
      </div>
    </div>

    <!-- TABLE SECTION -->
    <div class="card shadow-sm">
      <div class="card-body">

        <input type="text" class="form-control w-25 mb-3" placeholder="Search" [(ngModel)]="searchText">

        <table class="table table-bordered table-hover">
          <thead class="table-light">
            <tr>
              <th>S.No</th>
              <th>Structure</th>
              <th>Company</th>
              <th>Region</th>
              <th>Active</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let s of paginatedStructures(); let i = index">
              <td>{{ (currentPage - 1) * pageSize + i + 1 }}</td>
              <td>{{ s.structureName }}</td>
              <td>{{ companyMap[s.companyId || ''] }}</td>
              <td>{{ regionMap[s.regionId || ''] }}</td>
              <td>{{ s.isActive ? 'Yes' : 'No' }}</td>
              <td>
                <button class="btn btn-sm btn-primary me-2" (click)="editStructure(s)">
                  Edit
                </button>

                <button class="btn btn-sm btn-danger" (click)="deleteStructure(s)">
                  Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>

      </div>
    </div>

  </div>
</div>
