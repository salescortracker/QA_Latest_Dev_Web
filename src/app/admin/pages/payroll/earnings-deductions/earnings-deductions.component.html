<div class="card shadow-sm">
  <div class="container-fluid p-4 earnings-deductions">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-semibold">Salary Components</h4>
    </div>

    <!-- Form Section -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <form (ngSubmit)="onSubmit()" #form="ngForm" novalidate>
          <div class="row g-3">

            <!-- Component Name -->
            <div class="col-md-4">
              <label class="form-label">Component Name *</label>
              <input type="text" class="form-control" [(ngModel)]="component.componentName" name="componentName"
                required placeholder="Basic, HRA">
            </div>

            <!-- Type -->
            <div class="col-md-4">
              <label class="form-label">Type *</label>
              <select class="form-select" [(ngModel)]="component.type" name="type" required>
                <option value="">Select Type</option>
                <option value="Earning">Earning</option>
                <option value="Deduction">Deduction</option>
              </select>
            </div>

            <!-- Calculation Type -->
            <div class="col-md-4">
              <label class="form-label">Calculation Type</label>
              <select class="form-select" [(ngModel)]="component.calculationType" name="calculationType">
                <option value="Fixed">Fixed</option>
                <option value="Percentage">Percentage</option>
              </select>
            </div>

            <!-- Percentage Of -->
            <div class="col-md-4" *ngIf="component.calculationType === 'Percentage'">
              <label class="form-label">Percentage Of</label>
              <select class="form-select" [(ngModel)]="component.percentageOf" name="percentageOf">
                <option value="Basic">Basic</option>
                <option value="Gross">Gross</option>
              </select>
            </div>

            <!-- Company Dropdown -->
            <div class="col-md-4">
              <label class="form-label">Company</label>
              <select class="form-select" [(ngModel)]="component.companyId" name="companyId">
                <option value="">Select Company</option>
                <option *ngFor="let c of companies" [value]="c.companyId">
                  {{ c.companyName }}
                </option>
              </select>
            </div>

            <!-- Region Dropdown -->
            <div class="col-md-4">
              <label class="form-label">Region</label>
              <select class="form-select" [(ngModel)]="component.regionId" name="regionId">
                <option value="">Select Region</option>
                <option *ngFor="let r of regions" [value]="r.regionId">
                  {{ r.regionName }}
                </option>
              </select>
            </div>

            <!-- Is Taxable -->
            <div class="col-md-3 d-flex align-items-center mt-4">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" [(ngModel)]="component.isTaxable" name="isTaxable">
                <label class="form-check-label ms-2">Is Taxable</label>
              </div>
            </div>

            <!-- Is Active -->
            <div class="col-md-3 d-flex align-items-center mt-4">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" [(ngModel)]="component.isActive" name="isActive">
                <label class="form-check-label ms-2">Is Active</label>
              </div>
            </div>

            <!-- Buttons -->
            <div class="col-md-6 text-end mt-4">
              <button class="btn btn-success me-2" type="submit" [disabled]="!form.valid">
                {{ isEditMode ? 'Update' : 'Save' }}
              </button>

              <button class="btn btn-secondary" type="button" (click)="resetForm()">
                Reset
              </button>
            </div>

          </div>
        </form>
      </div>
    </div>

    <!-- Table -->
    <div class="card shadow-sm">
      <div class="card-body">

        <input type="text" class="form-control w-25 mb-3" placeholder="Search" [(ngModel)]="searchText">

        <table class="table table-bordered table-hover">
          <thead class="table-light">
            <tr>
              <th>S.No</th>
              <th>Component</th>
              <th>Type</th>
              <th>Company</th>
              <th>Region</th>
              <th>Active</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let c of paginatedComponents(); let i = index">
              <td>{{ (currentPage - 1) * pageSize + i + 1 }}</td>
              <td>{{ c.componentName }}</td>
              <td>{{ c.type }}</td>
              <td>{{ companyMap[c.companyId || ''] || '' }}</td>
              <td>{{ regionMap[c.regionId || ''] || '' }}</td>
              <td>{{ c.isActive ? 'Yes' : 'No' }}</td>
              <td>
                <button class="btn btn-sm btn-primary me-2" (click)="editComponent(c)">Edit</button>
                <button class="btn btn-sm btn-danger" (click)="deleteComponent(c)">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>

      </div>
    </div>

  </div>
</div>
