<div class="card shadow-sm">
  <div class="container-fluid p-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-semibold mb-0">
        <i class="fa-solid fa-list-check me-2 text-primary"></i>
        Policy Category
      </h4>
    </div>

    <hr />

    <!-- FORM -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <form #pcForm="ngForm" (ngSubmit)="onSubmit()" novalidate>

          <div class="row g-3">

            <!-- Policy Category Name -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Category Name *</label>
             <input type="text" class="form-control" name="PolicyCategoryName"
       [(ngModel)]="policy.PolicyCategoryName" required placeholder="Enter Policy Category Name" />

            </div>

            <!-- Description -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Description</label>
              <input type="text" class="form-control" name="description" [(ngModel)]="policy.description"
                placeholder="Enter Description" />
            </div>

            <!-- Company -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Company *</label>
              <select class="form-select" name="companyId" [(ngModel)]="companyId" (change)="onCompanyChange()"
                required>
                <option value="">-- Select Company --</option>
                <option *ngFor="let c of companies" [value]="c.companyId">
                  {{ c.companyName }}
                </option>
              </select>
            </div>

            <!-- Region -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Region *</label>
              <select class="form-select" name="regionId" [(ngModel)]="regionId" (change)="onRegionChange()" required>
                <option value="">-- Select Region --</option>
                <option *ngFor="let r of regions" [value]="r.regionID">
                  {{ r.regionName }}
                </option>
              </select>
            </div>

            <!-- NEW: ATTENDANCE CATEGORY DROPDOWN -->
            <div class="col-md-4">
              <label class="form-label fw-semibold">Attendance Category *</label>

             <select class="form-select" name="attendanceCategoryId"
        [(ngModel)]="policy.attendanceCategoryId"
        [disabled]="!regionId"
        required>
  <option value="">-- Select Attendance Category --</option>
  <option *ngFor="let ac of attendanceCategories" [value]="ac.categoryId">
    {{ ac.categoryName }}
  </option>
</select>


              <!-- Validation Message -->
              <small class="text-danger" *ngIf="pcForm.submitted && !policy.attendanceCategoryId">
                Attendance category is required.
              </small>
            </div>

            <!-- Active Switch -->
            <div class="col-md-2 d-flex align-items-center mt-4">
              <label class="me-2 fw-semibold">Active</label>
              <div class="form-check form-switch">
                <input type="checkbox" class="form-check-input" name="isActive" [(ngModel)]="policy.isActive" />
              </div>
            </div>

            <!-- Buttons -->
            <div class="col-md-10 mt-4 text-end">
              <button class="btn btn-success me-2" type="submit" [disabled]="!pcForm.valid">
                <i class="fa-solid fa-save me-2"></i>
                {{ isEditMode ? "Update" : "Save" }}
              </button>

              <button class="btn btn-secondary" type="button" (click)="resetForm()">
                <i class="fa-solid fa-rotate-left me-2"></i> Reset
              </button>
            </div>

          </div>
        </form>
      </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">
      <div class="card-body">

        <!-- Search -->
        <div class="mb-3 d-flex justify-content-end">
          <input class="form-control w-25" placeholder="Search Category" [(ngModel)]="searchText" />
        </div>

        <table class="table table-bordered table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th style="width: 80px;">S.No</th>
              <th>Name</th>
              <th>Description</th>
              <th>Company</th>
              <th>Region</th>
              <th class="text-center">Active</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>

          <tbody>

            <tr *ngFor="let p of filteredList(); let i = index">
              <td>{{ i + 1 }}</td>
              <td>{{ p.PolicyCategoryName }}</td>
              <td>{{ p.description || '—' }}</td>
              <td>{{ companyMap[p.companyId] }}</td>
              <td>{{ regionMap[p.regionId] }}</td>

              <td class="text-center">
                <i class="fa-solid"
                  [ngClass]="p.isActive ? 'fa-circle-check text-success' : 'fa-circle-xmark text-danger'">
                </i>
              </td>

              <td class="text-center">
                <button class="btn btn-sm btn-outline-primary me-2" (click)="edit(p)">
                  <i class="fa-solid fa-pen-to-square"></i>
                </button>

                <button class="btn btn-sm btn-outline-danger" (click)="delete(p)">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </td>
            </tr>

            <tr *ngIf="filteredList().length === 0">
              <td colspan="7" class="text-center text-muted">
                No records found
              </td>
            </tr>

          </tbody>
        </table>

      </div>
    </div>

  </div>
</div>
