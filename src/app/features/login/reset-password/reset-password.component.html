<div class="container">
  <div class="left-panel">
    <h1>Create New Password</h1>

    <div class="hrms-features">
      <div class="feature">
        <i class="fa fa-lock"></i>
        <div class="feature-text">
          <strong>Strong Password</strong>
          <p>Choose a strong password to secure your account.</p>
        </div>
      </div>
    </div>

    <div class="circle one"></div>
    <div class="circle two"></div>
    <div class="circle three"></div>
    <div class="circle four"></div>
  </div>

  <div class="right-panel">
    <div class="logo">
      <img src="/assets/images/cor-logo.png" alt="HRMS Logo">
    </div>

    <h2>Reset Password</h2>

    <form (ngSubmit)="reset()">
      <div class="input-group password-group">
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="newPassword" name="newPassword"
          placeholder="Enter New Password" required />

        <i class="fa" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'" (click)="togglePassword()"></i>
      </div>

      <button type="submit">
        Reset Password
      </button>
    </form>
  </div>
</div>
