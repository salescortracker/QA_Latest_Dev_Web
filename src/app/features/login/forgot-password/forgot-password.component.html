<div class="container">
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <h1>Password Recovery</h1>

    <div class="hrms-features">
      <div class="feature">
        <i class="fa fa-shield-alt"></i>
        <div class="feature-text">
          <strong>Secure Access</strong>
          <p>We ensure your account remains protected at all times.</p>
        </div>
      </div>

      <div class="feature">
        <i class="fa fa-envelope"></i>
        <div class="feature-text">
          <strong>Email Verification</strong>
          <p>An OTP will be sent to your registered email address.</p>
        </div>
      </div>
    </div>

    <div class="circle one"></div>
    <div class="circle two"></div>
    <div class="circle three"></div>
    <div class="circle four"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="logo">
      <img src="/assets/images/cor-logo.png" alt="HRMS Logo">
    </div>

    <h2>Forgot Password</h2>

    <form (ngSubmit)="sendOtp()">
      <div class="input-group">
        <i class="fa fa-envelope"></i>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your registered email"
          required
        />
      </div>

      <button type="submit">
        Send OTP
      </button>

      <div class="footer">
        <a routerLink="/">Back to Sign In</a>
      </div>
    </form>
  </div>
</div>
